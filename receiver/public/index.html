<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ShotSense — Response Console</title>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>
<style>
  :root {
    --bg: #0b0e12;
    --surface: #141a21;
    --surface-alt: #1b232c;
    --line: #232c36;
    --amber: #ffb300;
    --teal: #1de9b6;
    --red: #ff5252;
    --green: #69f0ae;
    --text: #e6e8eb;
    --dim: #8a929b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Roboto, "Segoe UI", system-ui, sans-serif;
    font-variant-numeric: tabular-nums;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-size: 18px;
    letter-spacing: 2px;
    margin: 0;
    color: var(--amber);
    font-weight: 700;
  }
  .spacer { flex: 1; }
  .pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--dim);
  }
  .pill.live { color: var(--green); border-color: var(--green); }
  .pill.down { color: var(--red); border-color: var(--red); }
  .counts b { color: var(--text); }
  button.ctl {
    background: var(--surface-alt);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  button.ctl:hover { border-color: var(--teal); }
  button.ctl.active { color: var(--bg); background: var(--teal); border-color: var(--teal); font-weight: 700; }

  main { flex: 1; display: flex; min-height: 0; }
  #map { flex: 1; min-width: 0; background: #0e1318; }
  aside {
    width: 420px;
    max-width: 45vw;
    border-left: 1px solid var(--line);
    background: var(--surface);
    overflow-y: auto;
    padding: 12px;
  }
  .empty { color: var(--dim); text-align: center; padding: 40px 10px; font-size: 14px; }

  .card {
    border: 1px solid var(--line);
    border-left-width: 4px;
    border-radius: 8px;
    background: var(--surface-alt);
    padding: 12px;
    margin-bottom: 10px;
  }
  .card.gunshot { border-left-color: var(--red); }
  .card.test { border-left-color: var(--amber); opacity: 0.85; }
  .card.unack.gunshot { animation: flash 1s ease-in-out infinite; }
  @keyframes flash {
    0%, 100% { background: var(--surface-alt); }
    50% { background: #2a1414; }
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--line); flex-shrink: 0;
    background: var(--surface-alt); display: flex; align-items: center;
    justify-content: center; font-size: 18px; font-weight: 700; color: var(--dim);
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .operator-block { flex: 1; min-width: 0; }
  .operator-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .operator-meta { font-size: 12px; color: var(--dim); }
  .card .row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 4px;
  }
  .badge.gunshot { background: var(--red); color: #1a0000; }
  .badge.test { background: var(--amber); color: #1a1200; }
  .device { font-weight: 700; }
  .when { color: var(--dim); font-size: 12px; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px;
    font-size: 13px; margin: 8px 0;
  }
  .grid .k { color: var(--dim); }
  .grid .v { text-align: right; }
  .v.confirmed { color: var(--green); }
  .v.soundonly { color: var(--amber); }
  .actions { display: flex; gap: 8px; margin-top: 6px; }
  .actions a, .actions button {
    flex: 1; text-align: center; text-decoration: none;
    font-size: 12px; padding: 6px; border-radius: 6px;
    border: 1px solid var(--line); color: var(--text);
    background: transparent; cursor: pointer;
  }
  .actions a:hover { border-color: var(--teal); }
  .actions .ack { border-color: var(--red); color: var(--red); }
  .actions .ack:hover { background: var(--red); color: #1a0000; }
  .acked-tag { color: var(--green); font-size: 11px; }
  .leaflet-popup-content { font-family: Roboto, sans-serif; }
</style>
</head>
<body>
<header>
  <h1>SHOTSENSE • RESPONSE CONSOLE</h1>
  <span id="conn" class="pill down">CONNECTING…</span>
  <span class="pill counts">Alerts: <b id="count">0</b> &nbsp;|&nbsp; Live: <b id="liveCount">0</b></span>
  <div class="spacer"></div>
  <button id="filterBtn" class="ctl">Showing: ALL</button>
  <button id="soundBtn" class="ctl">🔔 Enable alarm</button>
</header>
<main>
  <div id="map"></div>
  <aside>
    <div id="list"><div class="empty">No alerts yet. Waiting for the first signal…</div></div>
  </aside>
</main>

<!-- Leaflet loaded without SRI so a hash bump can't break the console; if the
     CDN is unreachable (offline), the alert list still works without the map. -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  'use strict';

  var alerts = [];          // newest last
  var markers = {};         // id -> L.marker
  var filter = 'ALL';       // ALL | GUNSHOT | TEST
  var soundEnabled = false;
  var audioCtx = null;
  var alarmTimer = null;

  var listEl = document.getElementById('list');
  var countEl = document.getElementById('count');
  var liveCountEl = document.getElementById('liveCount');
  var connEl = document.getElementById('conn');

  // --- map (degrades gracefully if Leaflet/CDN unavailable) ---------------
  var map = null;
  if (window.L) {
    map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap',
    }).addTo(map);
  } else {
    document.getElementById('map').innerHTML =
      '<div class="empty">Map unavailable (offline). Alert list still works.</div>';
  }

  // --- alarm (Web Audio; no asset needed) ---------------------------------
  function beep(freq, when, dur) {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = freq;
    o.connect(g);
    g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.25, when + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.start(when);
    o.stop(when + dur);
  }
  function siren() {
    if (!soundEnabled || !audioCtx) return;
    var t = audioCtx.currentTime;
    beep(880, t, 0.25);
    beep(660, t + 0.3, 0.25);
  }
  function startAlarm() {
    if (!soundEnabled) return;
    siren();
    if (alarmTimer) clearInterval(alarmTimer);
    alarmTimer = setInterval(siren, 1200);
  }
  function stopAlarmIfAllAck() {
    var anyUnack = alerts.some(function (a) { return !a.test && !a.acknowledged; });
    if (!anyUnack && alarmTimer) {
      clearInterval(alarmTimer);
      alarmTimer = null;
    }
  }

  // --- formatting ---------------------------------------------------------
  function fmtCoord(v) { return v == null ? '—' : v.toFixed(6); }
  function fmtNum(v, d) { return v == null ? '—' : v.toFixed(d); }
  function fmtTime(iso) {
    try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
  }

  function avatarHtml(a) {
    var initial = (a.operatorName || a.deviceId || '?').charAt(0).toUpperCase();
    if (a.photoUrl) {
      return '<div class="avatar"><img src="' + escapeHtml(a.photoUrl) +
        '" alt="" onerror="this.parentNode.innerHTML=\'' + escapeHtml(initial) + '\'"></div>';
    }
    return '<div class="avatar">' + escapeHtml(initial) + '</div>';
  }

  function cardHtml(a) {
    var kind = a.test ? 'test' : 'gunshot';
    var conf = a.confirmed
      ? '<span class="v confirmed">CONFIRMED (sound+recoil)</span>'
      : '<span class="v soundonly">SOUND ONLY</span>';
    var hasLoc = a.lat != null && a.lng != null;
    var maps = hasLoc ? 'https://maps.google.com/?q=' + a.lat + ',' + a.lng : '#';
    var locStr = hasLoc
      ? fmtCoord(a.lat) + ', ' + fmtCoord(a.lng) + (a.approximateLocation ? ' (approx)' : '')
      : 'unavailable';
    var unack = !a.test && !a.acknowledged ? ' unack' : '';
    var operatorName = a.operatorName || a.deviceId;
    var metaParts = [];
    if (a.operatorPhone) metaParts.push(escapeHtml(a.operatorPhone));
    if (a.firearmType) metaParts.push(escapeHtml(a.firearmType));
    if (!a.operatorName) metaParts.push('Device: ' + escapeHtml(a.deviceId));
    return (
      '<div class="card ' + kind + unack + '" id="card-' + a.id + '">' +
        '<div class="row1">' +
          avatarHtml(a) +
          '<div class="operator-block">' +
            '<div class="operator-name">' + escapeHtml(operatorName) + '</div>' +
            (metaParts.length ? '<div class="operator-meta">' + metaParts.join(' · ') + '</div>' : '') +
          '</div>' +
          '<div style="text-align:right;flex-shrink:0">' +
            '<span class="badge ' + kind + '">' + (a.test ? 'TEST' : 'GUNSHOT') + '</span><br>' +
            '<span class="when">' + fmtTime(a.receivedAt) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="grid">' +
          '<span class="k">Shots</span><span class="v">' + a.shots + '</span>' +
          '<span class="k">Confidence</span>' + conf +
          '<span class="k">Sound peak</span><span class="v">' + fmtNum(a.soundPeak, 3) + '</span>' +
          '<span class="k">Recoil</span><span class="v">' + fmtNum(a.recoilG, 2) + ' g</span>' +
          '<span class="k">Location</span><span class="v">' + locStr + '</span>' +
          '<span class="k">Accuracy</span><span class="v">' +
            (a.accuracyMeters != null ? fmtNum(a.accuracyMeters, 0) + ' m' : '—') + '</span>' +
          '<span class="k">Device time</span><span class="v">' + fmtTime(a.timestamp) + '</span>' +
        '</div>' +
        '<div class="actions">' +
          (hasLoc ? '<a href="' + maps + '" target="_blank" rel="noopener">Open in Maps</a>' : '') +
          (hasLoc && map ? '<button onclick="window.__focus(\'' + a.id + '\')">Show on map</button>' : '') +
          (!a.test
            ? (a.acknowledged
                ? '<span class="acked-tag">✓ acknowledged</span>'
                : '<button class="ack" onclick="window.__ack(\'' + a.id + '\')">Acknowledge</button>')
            : '') +
        '</div>' +
      '</div>'
    );
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function passesFilter(a) {
    if (filter === 'ALL') return true;
    if (filter === 'GUNSHOT') return !a.test;
    if (filter === 'TEST') return a.test;
    return true;
  }

  function render() {
    var visible = alerts.filter(passesFilter).slice().reverse(); // newest first
    if (!visible.length) {
      listEl.innerHTML = '<div class="empty">No alerts to show for this filter.</div>';
    } else {
      listEl.innerHTML = visible.map(cardHtml).join('');
    }
    countEl.textContent = alerts.length;
    liveCountEl.textContent = alerts.filter(function (a) { return !a.test; }).length;
  }

  function placeMarker(a) {
    if (!map || a.lat == null || a.lng == null) return;
    var color = a.test ? '#ffb300' : '#ff5252';
    var m = L.circleMarker([a.lat, a.lng], {
      radius: a.test ? 7 : 10,
      color: color,
      fillColor: color,
      fillOpacity: 0.7,
      weight: 2,
    }).addTo(map);
    m.bindPopup(
      '<b>' + (a.test ? 'TEST' : 'GUNSHOT') + '</b><br>' +
      escapeHtml(a.deviceId) + '<br>' +
      'Shots: ' + a.shots + '<br>' +
      (a.confirmed ? 'Confirmed (sound+recoil)' : 'Sound only') + '<br>' +
      fmtTime(a.receivedAt)
    );
    markers[a.id] = m;
  }

  window.__focus = function (id) {
    var m = markers[id];
    if (m && map) {
      map.setView(m.getLatLng(), 16);
      m.openPopup();
    }
  };

  window.__ack = function (id) {
    fetch('/api/ack?id=' + encodeURIComponent(id), { method: 'POST' });
    // optimistic; the SSE 'ack' event will also arrive
    var a = alerts.find(function (x) { return x.id === id; });
    if (a) a.acknowledged = true;
    render();
    stopAlarmIfAllAck();
  };

  function addAlert(a, isNew) {
    alerts.push(a);
    if (alerts.length > 500) alerts.shift();
    placeMarker(a);
    render();
    if (isNew && a.lat != null && a.lng != null && map) {
      map.setView([a.lat, a.lng], 15);
    }
    if (isNew && !a.test) {
      startAlarm();
      notify(a);
    }
  }

  // --- desktop notifications ----------------------------------------------
  function notify(a) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    var body =
      a.deviceId + ' — ' + a.shots + ' shot(s)\n' +
      (a.confirmed ? 'Confirmed (sound+recoil)' : 'Sound only') +
      (a.lat != null ? '\n' + fmtCoord(a.lat) + ', ' + fmtCoord(a.lng) : '');
    try { new Notification('🔴 GUNSHOT ALERT', { body: body }); } catch (e) {}
  }

  // --- controls -----------------------------------------------------------
  document.getElementById('filterBtn').onclick = function () {
    filter = filter === 'ALL' ? 'GUNSHOT' : filter === 'GUNSHOT' ? 'TEST' : 'ALL';
    this.textContent = 'Showing: ' + filter;
    render();
  };

  document.getElementById('soundBtn').onclick = function () {
    soundEnabled = !soundEnabled;
    this.classList.toggle('active', soundEnabled);
    this.textContent = soundEnabled ? '🔔 Alarm ON' : '🔔 Enable alarm';
    if (soundEnabled) {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      beep(880, audioCtx.currentTime, 0.15); // confirmation chirp
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    } else if (alarmTimer) {
      clearInterval(alarmTimer);
      alarmTimer = null;
    }
  };

  // --- live stream --------------------------------------------------------
  function connect() {
    var es = new EventSource('/events');
    es.addEventListener('hello', function () {
      connEl.textContent = 'LIVE';
      connEl.className = 'pill live';
    });
    es.addEventListener('alert', function (e) {
      addAlert(JSON.parse(e.data), true);
    });
    es.addEventListener('ack', function (e) {
      var id = JSON.parse(e.data).id;
      var a = alerts.find(function (x) { return x.id === id; });
      if (a) { a.acknowledged = true; render(); stopAlarmIfAllAck(); }
    });
    es.onerror = function () {
      connEl.textContent = 'RECONNECTING…';
      connEl.className = 'pill down';
    };
  }

  // --- boot ---------------------------------------------------------------
  fetch('/api/alerts')
    .then(function (r) { return r.json(); })
    .then(function (existing) {
      existing.forEach(function (a) { addAlert(a, false); });
    })
    .catch(function () {})
    .finally(connect);
})();
</script>
</body>
</html>
